name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swiftlint:
    name: SwiftLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: SwiftLint
        uses: norio-nomura/action-swiftlint@3.2.1

  test:
    name: Test (Linux, Swift 6.2)
    runs-on: ubuntu-latest
    container:
      image: swift:6.2
    steps:
      - uses: actions/checkout@v4
      - name: Cache Swift PM build
        uses: actions/cache@v4
        with:
          path: .build
          key: linux-swift6.2-spm-${{ hashFiles('Package.swift') }}
          restore-keys: |
            linux-swift6.2-spm-
      - name: Print Swift version
        run: swift --version
      - name: Resolve dependencies
        run: swift package resolve
      - name: Run tests
        run: swift test --parallel

  test-latest:
    name: Test (Linux, Swift latest)
    runs-on: ubuntu-latest
    container:
      image: swift:latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Cache Swift PM build
        uses: actions/cache@v4
        with:
          path: .build
          key: linux-swift-latest-spm-${{ hashFiles('Package.swift') }}
          restore-keys: |
            linux-swift-latest-spm-
      - name: Print Swift version
        run: swift --version
      - name: Resolve dependencies
        run: swift package resolve
      - name: Run tests
        run: swift test --parallel

  integration:
    name: Integration tests (OpenRouter API, Swift 6.2)
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    container:
      image: swift:6.2
    steps:
      - uses: actions/checkout@v4
      - name: Cache Swift PM build
        uses: actions/cache@v4
        with:
          path: .build
          key: linux-swift6.2-spm-${{ hashFiles('Package.swift') }}
          restore-keys: |
            linux-swift6.2-spm-
      - name: Print Swift version
        run: swift --version
      - name: Resolve dependencies
        run: swift package resolve
      - name: Require OpenRouter API key
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          if [ -z "$OPENROUTER_API_KEY" ]; then
            echo "::error::OPENROUTER_API_KEY repo secret is not configured, so integration tests cannot run."
            exit 1
          fi
      - name: Run integration tests
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: swift test --parallel
